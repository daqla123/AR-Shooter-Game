<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>AR 兔子射击游戏</title>
    <!-- MediaPipe Face Detection -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4.1646425229/face_detection.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="gameContainer">
        <!-- 视频层 -->
        <video id="video" playsinline webkit-playsinline autoplay muted></video>
        
        <!-- 游戏画布层 -->
        <canvas id="gameCanvas"></canvas>
        
        <!-- UI层 -->
        <div id="uiLayer">
            <div id="scoreBoard">
                <div class="score">得分: <span id="score">0</span></div>
                <div class="health-bar-container">
                    <div class="health-label">HP: <span id="health">100</span></div>
                    <div class="health-bar-bg">
                        <div class="health-bar" id="healthBar"></div>
                    </div>
                </div>
            </div>
            
            <div id="gestureIndicator">
                <div id="fireStatus">🔥 点击屏幕射击</div>
            </div>
            
            <div id="ammoDisplay">
                <span id="ammo">🔫🔫🔫🔫🔫</span>
            </div>
        </div>
        
        <!-- 开始界面 -->
        <div id="startScreen">
            <div class="startContent">
                <h1>🐰 AR 兔子射击游戏</h1>
                <p>📱 请允许摄像头权限</p>
                <p>👆 点击屏幕任意位置射击</p>
                <p>🥕 兔子会扔萝卜，移动头部躲避！</p>
                <p>🎯 射击消灭兔子得分</p>
                <button id="startBtn">开始游戏</button>
            </div>
        </div>
        
        <!-- 加载界面 -->
        <div id="loadingScreen">
            <div class="loadingContent">
                <div class="spinner"></div>
                <p id="loadingText">正在加载AI模型...</p>
                <div class="progressBarContainer">
                    <div class="progressBar" id="progressBar"></div>
                </div>
                <p class="progressText" id="progressText">0%</p>
            </div>
        </div>
    </div>
    
    <script src="js/game.js"></script>
</body>
</html>
